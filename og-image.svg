<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#08090C"/>
  <!-- warm vignette -->
  <radialGradient id="vg" cx="50%" cy="0%" r="70%">
    <stop offset="0%" stop-color="#E7B252" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#08090C" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vg)"/>
  <!-- resonance curve (spectrum gradient) -->
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F2A93C"/>
      <stop offset="33%"  stop-color="#E1557F"/>
      <stop offset="66%"  stop-color="#7E5BE6"/>
      <stop offset="100%" stop-color="#36B6C8"/>
    </linearGradient>
    <!-- soft glow copy -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- glow layer -->
  <path d="M60 315 C180 315 180 175 340 175 C500 175 500 455 660 455 C820 455 820 220 940 220 C1020 220 1080 315 1140 315"
        fill="none" stroke="url(#wave)" stroke-width="14" stroke-linecap="round"
        opacity="0.25" filter="url(#glow)"/>
  <!-- main stroke -->
  <path d="M60 315 C180 315 180 175 340 175 C500 175 500 455 660 455 C820 455 820 220 940 220 C1020 220 1080 315 1140 315"
        fill="none" stroke="url(#wave)" stroke-width="4" stroke-linecap="round"/>
  <!-- wordmark icon -->
  <g transform="translate(80, 72)" fill="none">
    <rect width="52" height="52" rx="11" fill="#08090C" stroke="#E7B252" stroke-width="1.5" opacity="0.4"/>
    <path d="M8 26 C15 26 15 12 22 12 C29 12 29 40 36 40 C43 40 43 20 48 20"
          stroke="#E7B252" stroke-width="2.8" stroke-linecap="round"/>
  </g>
  <!-- brand name -->
  <text x="150" y="113" font-family="system-ui, -apple-system, sans-serif"
        font-weight="700" font-size="34" fill="#ECEEF2" letter-spacing="-0.5">Resonance Ventures</text>
  <!-- tagline -->
  <text x="80" y="510" font-family="ui-monospace, monospace"
        font-size="22" fill="#8A91A0" letter-spacing="2">A Colorado studio · Software &amp; live experiences</text>
  <!-- baseline -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="rgba(236,238,242,0.09)" stroke-width="1"/>
</svg>
